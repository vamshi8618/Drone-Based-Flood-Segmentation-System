<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Segmentation</title>
    <style>
        body {
        font-family: Arial, sans-serif;
        background: url("{{ url_for('static', filename='backroundindx.jpg') }}") no-repeat center center fixed;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
        padding: 0;
    }
        h1 {
            text-align: center;
            color: #fff; /* White text to contrast with the background */
            margin-top: 50px;
            font-size: 36px;
            font-weight: bold;
        }
        .container {
            width: 80%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8); /* Slight transparency for the container */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label {
            font-size: 18px;
            color: #333;
        }
        input[type="file"] {
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        input[type="file"]:focus {
            border-color: #5cb85c;
            outline: none;
        }
        button {
            background-color: black;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #4cae4c;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #777;
        }
    </style>
</head>
<body>
    <h1>Flood Area Segmentation</h1>
    <div class="container">
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <label for="image">Upload an image:</label>
            <input type="file" id="image" name="image" accept="image/*" required>
            <button type="submit">Process</button>
        </form>
    </div>
    <footer>
        <p>&copy; 2024 Flood Area Segmentation. All rights reserved.</p>
    </footer>
</body>
</html>
